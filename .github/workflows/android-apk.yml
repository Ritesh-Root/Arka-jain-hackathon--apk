name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon > ../gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Gradle build failed. Last 200 lines:"
            tail -n 200 ../gradle-build.log
            summary=$(tail -n 40 ../gradle-build.log | tr '\n' '|' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Gradle assembleDebug failed::$summary"
            exit "$status"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jeevan-rakshak-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
